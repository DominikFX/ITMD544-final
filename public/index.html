<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A/V Equipment Vault</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }

    .section {
      border: 1px solid #ccc;
      padding: 15px;
      flex: 1;
      min-width: 300px;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      border-bottom: 1px solid #eee;
      padding: 8px 0;
    }

    .warning-box {
      display: none;
      border: 1px solid red;
      color: red;
      padding: 10px;
      margin-bottom: 15px;
    }

    .form-group {
      margin-bottom: 10px;
    }

    label {
      display: inline-block;
      width: 120px;
    }
  </style>
</head>

<body>

  <h1>A/V Equipment Vault</h1>
  <p>Client Interface</p>
  <button onclick="resetDatabase()"
    style="background-color: red; color: white; padding: 10px; margin-bottom: 20px; border: none; cursor: pointer;">Reset
    & Seed Database</button>

  <div class="container">
    <!-- Form Section -->
    <div class="section">
      <h2>Create Reservation</h2>
      <div id="holiday-alert" class="warning-box"></div>

      <form id="reservation-form">
        <div class="form-group">
          <label>Crew Member:</label>
          <select id="crew-select" required>
            <option value="">Select...</option>
          </select>
        </div>
        <div class="form-group">
          <label>Equipment:</label>
          <select id="equipment-select" required>
            <option value="">Select...</option>
          </select>
        </div>
        <div class="form-group">
          <label>Checkout Date:</label>
          <input type="datetime-local" id="checkout-date" required>
        </div>
        <div class="form-group">
          <label>Return Date:</label>
          <input type="datetime-local" id="return-date" required>
        </div>
        <div class="form-group">
          <label>Event Venue:</label>
          <input type="text" id="venue" required>
        </div>
        <button type="submit">Submit Reservation</button>
      </form>
    </div>

    <!-- Data Section -->
    <div class="section">
      <h2>Active Reservations</h2>
      <ul id="reservations-list"></ul>
    </div>

    <div class="section">
      <h2>Equipment</h2>
      <ul id="equipment-list"></ul>
    </div>

    <div class="section">
      <h2>Crew</h2>
      <ul id="crew-list"></ul>
    </div>
  </div>

  <script>
    const GRAPHQL_URL = '/graphql';

    async function fetchGraphQL(query, variables = {}) {
      const res = await fetch(GRAPHQL_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, variables })
      });
      return res.json();
    }

    async function loadData() {
      const query = `
                query {
                    equipment { id name sku category is_available }
                    crewMembers { id name role }
                    reservations { 
                        id event_venue status checkout_date return_date 
                        requires_holiday_pay desk_closed_warning
                        crew_member { name }
                        equipment { name }
                    }
                }
            `;

      try {
        const { data } = await fetchGraphQL(query);

        // Equipment
        const eqList = document.getElementById('equipment-list');
        const eqSelect = document.getElementById('equipment-select');
        eqList.innerHTML = '';
        eqSelect.innerHTML = '<option value="">Select...</option>';
        data.equipment.forEach(eq => {
          eqList.innerHTML += `<li>${eq.name} (${eq.sku}) - ${eq.is_available ? 'Available' : 'In Use'}</li>`;
          if (eq.is_available) {
            eqSelect.innerHTML += `<option value="${eq.id}">${eq.name}</option>`;
          }
        });

        // Crew
        const crewList = document.getElementById('crew-list');
        const crewSelect = document.getElementById('crew-select');
        crewList.innerHTML = '';
        crewSelect.innerHTML = '<option value="">Select...</option>';
        data.crewMembers.forEach(crew => {
          crewList.innerHTML += `<li>${crew.name} - ${crew.role}</li>`;
          crewSelect.innerHTML += `<option value="${crew.id}">${crew.name}</option>`;
        });

        // Reservations
        const resList = document.getElementById('reservations-list');
        resList.innerHTML = '';
        data.reservations.forEach(res => {
          const eqNames = res.equipment.map(e => e.name).join(', ');
          let warning = res.requires_holiday_pay ? `<br><small style="color:red;">${res.desk_closed_warning}</small>` : '';
          resList.innerHTML += `
                        <li>
                            <strong>${res.event_venue}</strong> (${res.status})
                            <button onclick="updateReservationStatus('${res.id}')" style="margin-left: 10px;">Complete</button>
                            <button onclick="deleteReservation('${res.id}')" style="color: red;">Delete</button>
                            <br>
                            Crew: ${res.crew_member ? res.crew_member.name : 'Unknown'} | Eq: ${eqNames}<br>
                            ${res.checkout_date} to ${res.return_date}
                            ${warning}
                        </li>
                    `;
        });

      } catch (err) {
        console.error("Error loading data:", err);
      }
    }

    async function updateReservationStatus(id) {
      try {
        const res = await fetch(\`/api/reservations/\${id}\`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: 'Completed' })
                });
                if (res.ok) {
                    alert('Status updated to Completed!');
                    loadData();
                } else {
                    alert('Failed to update status');
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function deleteReservation(id) {
            if (!confirm('Are you sure you want to delete this reservation?')) return;
            try {
                const res = await fetch(\`/api/reservations/\${id}\`, {
                    method: 'DELETE'
                });
                if (res.ok) {
                    alert('Reservation deleted!');
                    loadData();
                } else {
                    alert('Failed to delete reservation');
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function resetDatabase() {
            if (!confirm('WARNING: This will wipe all current data and reset the database with default dummy data. Proceed?')) return;
            try {
                const res = await fetch('/api/reset', { method: 'POST' });
                if (res.ok) {
                    alert('Database successfully wiped and seeded with default data!');
                    loadData(); // Refresh UI
                } else {
                    alert('Failed to reset database');
                }
            } catch (err) {
                console.error(err);
                alert('An error occurred while resetting');
            }
        }

        document.getElementById('reservation-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const crewId = document.getElementById('crew-select').value;
            const eqId = document.getElementById('equipment-select').value;
            
            const mutation = `
                mutation($crew_id: ID!, $equipment_ids: [ID!]!, $checkout_date: String!, $return_date: String!, $event_venue: String!) {
          createReservation(
            crew_id: $crew_id,
            equipment_ids: $equipment_ids,
            checkout_date: $checkout_date,
            return_date: $return_date,
            event_venue: $event_venue,
            status: "Pending"
          ) { id requires_holiday_pay desk_closed_warning }
        }
            `;

            try {
                const res = await fetchGraphQL(mutation, {
                    crew_id: crewId,
                    equipment_ids: [eqId],
                    checkout_date: new Date(document.getElementById('checkout-date').value).toISOString(),
                    return_date: new Date(document.getElementById('return-date').value).toISOString(),
                    event_venue: document.getElementById('venue').value
                });

                if (res.errors) {
                    alert('Error: ' + res.errors[0].message);
                    return;
                }

                const data = res.data.createReservation;
                const alertBox = document.getElementById('holiday-alert');

                if (data.requires_holiday_pay) {
                    alertBox.style.display = 'block';
                    alertBox.innerText = data.desk_closed_warning;
                } else {
                    alertBox.style.display = 'none';
                    alert('Reservation created successfully!');
                }

                document.getElementById('reservation-form').reset();
                loadData();
            } catch (err) {
                console.error(err);
                alert('Failed to submit');
            }
        });

        loadData();
  </script>
</body>

</html>
